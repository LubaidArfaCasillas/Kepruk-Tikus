<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kepruk Tikus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Kepruk Tikus</h1>
        <div class="stats">
            <div class="score-board">Skor: <span id="score">0</span></div>
            <div class="score-board">High Score: <span id="high-score">0</span></div>
            <div class="time-board">Waktu: <span id="time">15</span>s</div>
        </div>
        <button id="start-btn" onClick="mulaiGame()">Mulai Game</button>
    </div>

    <div class="game-board">
        <div class="hole hole1"><div class="mole"></div></div>
        <div class="hole hole2"><div class="mole"></div></div>
        <div class="hole hole3"><div class="mole"></div></div>
        <div class="hole hole4"><div class="mole"></div></div>
        <div class="hole hole5"><div class="mole"></div></div>
        <div class="hole hole6"><div class="mole"></div></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
